name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r api/requirements.txt -r worker/requirements.txt

      - name: Lint Python services with flake8
        run: flake8 api worker

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend with eslint
        working-directory: frontend
        run: npx eslint app.js

      - name: Lint Dockerfiles with hadolint
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r api/requirements.txt

      - name: Run API unit tests with coverage
        working-directory: api
        run: pytest tests -q --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: api/coverage.xml
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs:
      - test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and tag images
        uses: docker/build-push-action@v6
        with:
          context: ./api
          tags: |
            127.0.0.1:5000/hng14-stage2-devops/api:${{ github.sha }}
            127.0.0.1:5000/hng14-stage2-devops/api:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and tag worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          tags: |
            127.0.0.1:5000/hng14-stage2-devops/worker:${{ github.sha }}
            127.0.0.1:5000/hng14-stage2-devops/worker:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and tag frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          tags: |
            127.0.0.1:5000/hng14-stage2-devops/frontend:${{ github.sha }}
            127.0.0.1:5000/hng14-stage2-devops/frontend:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push images to local registry service container
        env:
          REGISTRY: 127.0.0.1:5000
          NAMESPACE: hng14-stage2-devops
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for svc in api worker frontend; do
            image="${REGISTRY}/${NAMESPACE}/${svc}"
            docker push "${image}:${TAG_SHA}"
            docker push "${image}:latest"
          done

      - name: Export image archives for downstream jobs
        env:
          REGISTRY: 127.0.0.1:5000
          NAMESPACE: hng14-stage2-devops
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p image-archives
          for svc in api worker frontend; do
            image="${REGISTRY}/${NAMESPACE}/${svc}"
            docker save "${image}:${TAG_SHA}" "${image}:latest" | gzip > "image-archives/${svc}.tar.gz"
          done

      - name: Upload image archives artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-image-archives
          path: image-archives/*.tar.gz
          if-no-files-found: error

  security_scan:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download image archives
        uses: actions/download-artifact@v4
        with:
          name: built-image-archives
          path: image-archives

      - name: Load images from archives
        run: |
          set -euo pipefail
          for archive in image-archives/*.tar.gz; do
            gzip -dc "${archive}" | docker load
          done

      - name: Trivy debug scan (table) for API image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: image
          image-ref: 127.0.0.1:5000/hng14-stage2-devops/api:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          format: table
          exit-code: "1"

      - name: Run Trivy scan for API image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: image
          image-ref: 127.0.0.1:5000/hng14-stage2-devops/api:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          format: sarif
          output: trivy-api.sarif
          exit-code: "0"

      - name: Trivy debug scan (table) for Worker image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: image
          image-ref: 127.0.0.1:5000/hng14-stage2-devops/worker:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          format: table
          exit-code: "1"

      - name: Run Trivy scan for Worker image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: image
          image-ref: 127.0.0.1:5000/hng14-stage2-devops/worker:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          format: sarif
          output: trivy-worker.sarif
          exit-code: "0"

      - name: Trivy debug scan (table) for Frontend image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: image
          image-ref: 127.0.0.1:5000/hng14-stage2-devops/frontend:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          format: table
          exit-code: "1"

      - name: Run Trivy scan for Frontend image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: image
          image-ref: 127.0.0.1:5000/hng14-stage2-devops/frontend:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-reports
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif
          if-no-files-found: error

  integration_test:
    runs-on: ubuntu-latest
    needs:
      - security_scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run end-to-end integration test through frontend
        env:
          INTEGRATION_TIMEOUT_SECONDS: "120"
        run: |
          chmod +x scripts/integration_test.sh
          ./scripts/integration_test.sh

      - name: Tear down stack
        if: always()
        run: docker compose --env-file env.docker.example down -v --remove-orphans

  deploy:
    runs-on: ubuntu-latest
    needs:
      - integration_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download image archives
        uses: actions/download-artifact@v4
        with:
          name: built-image-archives
          path: image-archives

      - name: Load frontend image archive
        run: gzip -dc image-archives/frontend.tar.gz | docker load

      - name: Deploy with health-gated rolling update
        env:
          IMAGE_BASE: ${{ vars.IMAGE_BASE }}
          TAG_SHA: ${{ github.sha }}
          DEPLOY_API_URL: ${{ secrets.DEPLOY_API_URL }}
        run: |
          set -euo pipefail
          if [ -z "${IMAGE_BASE}" ]; then
            echo "IMAGE_BASE repository variable is required."
            exit 1
          fi
          if [ -z "${DEPLOY_API_URL}" ]; then
            echo "DEPLOY_API_URL secret is required."
            exit 1
          fi
          IMAGE_BASE="${IMAGE_BASE/localhost:5000/127.0.0.1:5000}"
          docker network create deploy-net >/dev/null 2>&1 || true
          docker rm -f frontend-old frontend-new >/dev/null 2>&1 || true

          docker run -d --name frontend-old --network deploy-net \
            -e API_URL="${DEPLOY_API_URL}" -e HOST=0.0.0.0 -e PORT=3000 \
            -p 3000:3000 "${IMAGE_BASE}:latest"

          docker run -d --name frontend-new --network deploy-net \
            -e API_URL="${DEPLOY_API_URL}" -e HOST=0.0.0.0 -e PORT=3000 \
            -p 3001:3000 "${IMAGE_BASE}:${TAG_SHA}"

          healthy="false"
          for _ in $(seq 1 60); do
            status="$(docker inspect --format='{{.State.Health.Status}}' frontend-new || true)"
            if [ "${status}" = "healthy" ]; then
              healthy="true"
              break
            fi
            sleep 1
          done

          if [ "${healthy}" != "true" ]; then
            echo "New container failed health check within 60 seconds. Aborting deploy."
            docker logs frontend-new || true
            docker rm -f frontend-new >/dev/null 2>&1 || true
            exit 1
          fi

          docker rm -f frontend-old >/dev/null 2>&1
          docker rm -f frontend-new-prod >/dev/null 2>&1 || true
          docker run -d --name frontend-new-prod --network deploy-net \
            -e API_URL="${DEPLOY_API_URL}" -e HOST=0.0.0.0 -e PORT=3000 \
            -p 3000:3000 "${IMAGE_BASE}:${TAG_SHA}"
          echo "Rolling update completed successfully."
